<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0c">
  <title>Trade Genius — Module 4 : Étude des courbes</title>
  <meta name="description" content="Module 4 — Analyse technique avancée : patterns chandeliers, RSI, MACD, Fibonacci, volume profile, backtesting.">
  <link rel="manifest" href="manifest.json">
  <script defer src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
  <script type="module" src="tg-common.js?v=205"></script>
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0f;
      --bg-deep: #050507;
      --surface: #13131c;
      --surface-2: #1a1a25;
      --border: rgba(255,255,255,0.08);

      --text: #f8f5ee;
      --text-dim: #a8a8b3;
      --text-faint: #6a6a75;

      --acid: #bef264;
      --acid-glow: rgba(190,242,100,0.5);
      --purple: #a78bfa;
      --purple-glow: rgba(167,139,250,0.5);
      --blue: #60a5fa;
      --blue-glow: rgba(96,165,250,0.5);
      --gold: #f59e0b;
      --gold-glow: rgba(245,158,11,0.5);
      --red: #ef4444;
      --green: #22c55e;

      --font-d: 'Manrope', system-ui, sans-serif;
      --font-m: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-d);
      overflow: hidden;
      height: 100%;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    .view { display: none; height: 100vh; height: 100dvh; overflow-y: auto; overflow-x: hidden; position: relative; }
    .view.active { display: block; }

    /* ============ HUB (chapter list) ============ */
    #hub {
      padding: calc(20px + env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom));
      max-width: 480px; margin: 0 auto;
    }
    .hub-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px;
    }
    .back-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-m); font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 12px; border-radius: 10px;
      cursor: pointer;
    }
    .back-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.08); }
    .hub-brand {
      font-family: var(--font-m); font-size: 11px;
      letter-spacing: 0.22em; color: var(--purple); font-weight: 700;
      display: flex; align-items: center; gap: 8px;
    }
    .hub-brand::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--purple); box-shadow: 0 0 10px var(--purple-glow);
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 50% { opacity: 0.4; } }

    .hub-title {
      font-family: var(--font-d); font-size: 32px; font-weight: 800;
      letter-spacing: -0.02em; line-height: 1.05; margin: 0 0 4px;
    }
    .hub-title em { font-style: italic; color: var(--purple); font-weight: 700; }
    .hub-sub {
      font-family: var(--font-d); font-size: 14px; color: var(--text-dim);
      margin: 0 0 24px; line-height: 1.4;
    }

    .hub-progress {
      margin-bottom: 24px;
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(167,139,250,0.08) 0%, rgba(167,139,250,0.02) 100%);
      border: 1px solid rgba(167,139,250,0.22);
      border-radius: 14px;
    }
    .hp-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .hp-label {
      font-family: var(--font-m); font-size: 9.5px;
      letter-spacing: 0.18em; color: var(--purple); font-weight: 700;
      text-transform: uppercase;
    }
    .hp-text {
      font-family: var(--font-m); font-size: 11px; color: var(--text-dim);
      font-weight: 600;
    }
    .hp-bar-wrap {
      height: 6px; background: rgba(255,255,255,0.06);
      border-radius: 999px; overflow: hidden;
    }
    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple) 0%, var(--blue) 100%);
      border-radius: 999px;
      transition: width 0.85s cubic-bezier(0.2, 0.8, 0.2, 1);
      box-shadow: 0 0 12px var(--purple-glow);
    }

    .chapter-list { display: flex; flex-direction: column; gap: 10px; }
    .chapter-card {
      position: relative;
      display: grid; grid-template-columns: 44px 1fr auto; gap: 14px;
      align-items: center;
      padding: 14px 14px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--surface-2) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      transition: transform 0.15s, border-color 0.2s;
      overflow: hidden;
    }
    .chapter-card.available, .chapter-card.complete {
      cursor: pointer;
      border-color: rgba(167,139,250,0.35);
    }
    .chapter-card.available:active, .chapter-card.complete:active {
      transform: scale(0.985);
    }
    .chapter-card.complete {
      background: linear-gradient(135deg, rgba(34,197,94,0.08) 0%, var(--surface) 80%);
    }
    .chapter-card.locked, .chapter-card.premium-locked {
      opacity: 0.6;
    }
    .chapter-num {
      width: 44px; height: 44px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(167,139,250,0.12);
      color: var(--purple);
      font-family: var(--font-d); font-size: 15px; font-weight: 800;
      letter-spacing: -0.02em;
      border: 1px solid rgba(167,139,250,0.25);
    }
    .chapter-card.complete .chapter-num {
      background: rgba(34,197,94,0.18); color: var(--green);
      border-color: rgba(34,197,94,0.4);
    }
    .chapter-info { min-width: 0; }
    .chapter-name {
      font-family: var(--font-d); font-size: 15px; font-weight: 700;
      color: var(--text); line-height: 1.2; margin-bottom: 3px;
      letter-spacing: -0.01em;
    }
    .chapter-desc {
      font-family: var(--font-d); font-size: 12px; color: var(--text-dim);
      line-height: 1.3;
    }
    .chapter-state {
      font-family: var(--font-d); font-size: 22px; font-weight: 800;
      color: var(--purple);
    }
    .chapter-card.complete .chapter-state { color: var(--green); }
    .chapter-card.locked .chapter-state { color: var(--text-faint); font-size: 16px; }
    .chapter-pill {
      position: absolute; top: 8px; right: 10px;
      font-family: var(--font-m); font-size: 8.5px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 3px 7px; border-radius: 999px;
      background: rgba(245,158,11,0.16);
      color: var(--gold); border: 1px solid rgba(245,158,11,0.35);
    }
    .chapter-pill.locked { background: rgba(255,255,255,0.06); color: var(--text-faint); border-color: var(--border); }

    /* v2.04 — carte teaser expert (free uniquement) */
    .chapter-card.expert-teaser {
      cursor: pointer;
      margin-top: 8px;
      background: linear-gradient(135deg, rgba(245,158,11,0.14) 0%, rgba(167,139,250,0.10) 100%);
      border: 1px solid rgba(245,158,11,0.42);
      box-shadow: 0 8px 22px rgba(245,158,11,0.16);
      animation: expert-teaser-pulse 4s ease-in-out infinite;
    }
    .chapter-card.expert-teaser:active { transform: scale(0.985); }
    @keyframes expert-teaser-pulse {
      0%, 100% { box-shadow: 0 8px 22px rgba(245,158,11,0.14); }
      50%      { box-shadow: 0 12px 32px rgba(245,158,11,0.28), 0 0 14px rgba(167,139,250,0.18); }
    }
    .chapter-num.expert {
      background: linear-gradient(135deg, var(--gold), var(--purple));
      color: #0a0a0c;
      border-color: rgba(245,158,11,0.5);
      font-size: 20px;
    }
    .chapter-state.expert { color: var(--gold); }
    @media (prefers-reduced-motion: reduce) {
      .chapter-card.expert-teaser { animation: none; }
    }

    /* ============ READER ============ */
    #reader { position: fixed; inset: 0; background: var(--bg); }
    .reader-head {
      position: fixed; top: 0; left: 0; right: 0;
      padding: calc(12px + env(safe-area-inset-top)) 16px 12px;
      background: linear-gradient(180deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.7) 100%);
      -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
      z-index: 10; display: flex; align-items: center; justify-content: space-between;
      gap: 10px;
    }
    .head-close {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      width: 38px; height: 38px; border-radius: 10px;
      font-size: 18px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .head-close:active { transform: scale(0.94); }
    .head-meta { flex: 1; text-align: center; min-width: 0; }
    .head-meta .chapter {
      font-family: var(--font-m); font-size: 10px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--purple);
      display: block; margin-bottom: 2px;
    }
    .progress-bars {
      display: flex; gap: 4px; justify-content: center;
    }
    .bar {
      flex: 1; max-width: 40px; height: 3px;
      background: rgba(255,255,255,0.1); border-radius: 2px;
      overflow: hidden; position: relative;
    }
    .bar.done { background: var(--purple); }
    .bar.active::after {
      content: ''; position: absolute; inset: 0;
      background: var(--purple);
      animation: bar-pulse 1.8s ease-in-out infinite;
    }
    @keyframes bar-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
    .counter {
      font-family: var(--font-m); font-size: 10px; color: var(--text-faint);
      font-weight: 700; flex-shrink: 0; min-width: 32px; text-align: right;
    }

    #track-wrap {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    #track {
      display: flex; height: 100%;
      transition: transform 0.34s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    .slide {
      flex: 0 0 100%; width: 100%; min-width: 100%; height: 100%;
      padding: calc(72px + env(safe-area-inset-top)) 20px calc(96px + env(safe-area-inset-bottom));
      display: flex; flex-direction: column; justify-content: center;
      position: relative; overflow-y: auto;
    }
    .slide.s-intro { background: radial-gradient(ellipse at 50% 35%, #1a1424 0%, var(--bg-deep) 70%); }
    .slide.s-concept { background: linear-gradient(180deg, #0e0e16 0%, var(--bg) 100%); }
    .slide.s-example { background: radial-gradient(ellipse at 50% 50%, #131022 0%, var(--bg) 80%); }
    .slide.s-takeaway { background: linear-gradient(135deg, #0a0a0c 0%, #14111e 100%); }

    .eyebrow {
      font-family: var(--font-m); font-size: 10px; font-weight: 700;
      letter-spacing: 0.22em; color: var(--purple); text-transform: uppercase;
      margin-bottom: 12px;
    }
    .h1 {
      font-family: var(--font-d); font-size: 28px; font-weight: 800;
      line-height: 1.1; letter-spacing: -0.025em; margin: 0 0 14px;
    }
    .h1 em { font-style: italic; color: var(--purple); font-weight: 800; }
    .h1 .acid { color: var(--acid); font-style: normal; font-weight: 800; }
    .h1 .gold { color: var(--gold); font-style: normal; font-weight: 800; }
    .h1 .blue { color: var(--blue); font-style: normal; font-weight: 800; }
    .lead {
      font-family: var(--font-d); font-size: 15px; line-height: 1.45;
      color: var(--text-dim); margin: 0 0 16px;
    }
    .lead strong { color: var(--text); font-weight: 700; }

    .callout {
      padding: 14px 16px;
      background: linear-gradient(135deg, rgba(167,139,250,0.10) 0%, rgba(167,139,250,0.02) 100%);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 14px;
      margin: 12px 0;
    }
    .callout .ck-lbl {
      font-family: var(--font-m); font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.2em; color: var(--purple); text-transform: uppercase;
      margin-bottom: 6px;
    }
    .callout .ck-txt {
      font-family: var(--font-d); font-size: 13.5px; color: var(--text);
      line-height: 1.4;
    }
    .callout .ck-txt strong { color: var(--purple); }

    .points { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
    .point {
      display: grid; grid-template-columns: 34px 1fr; gap: 12px;
      align-items: start;
      padding: 12px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .point-icon { font-size: 22px; line-height: 1.1; }
    .point-text {
      font-family: var(--font-d); font-size: 13.5px; color: var(--text);
      line-height: 1.4;
    }
    .point-text strong { color: var(--purple); font-weight: 700; }
    .point.acid-pt { border-color: rgba(190,242,100,0.3); }
    .point.acid-pt .point-text strong { color: var(--acid); }

    .demo-canvas {
      width: 100%; height: 200px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-deep) 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: block;
      margin: 12px 0;
    }
    .demo-canvas.big {
      height: 260px;
      border: 1px solid rgba(167,139,250,0.25);
      box-shadow: 0 8px 24px rgba(0,0,0,0.32), inset 0 1px 0 rgba(255,255,255,0.04);
    }
    .demo-caption {
      font-family: var(--font-m); font-size: 10.5px;
      color: var(--text-faint); letter-spacing: 0.04em;
      text-align: center; margin: -4px 0 12px;
    }
    .lead-mini {
      font-family: var(--font-d); font-size: 13.5px;
      line-height: 1.45; color: var(--text-dim);
      margin: 8px 0 0; text-align: center;
    }
    .lead-mini strong { color: var(--text); font-weight: 700; }
    .vis-legend {
      display: flex; justify-content: center; gap: 18px;
      flex-wrap: wrap; margin-top: 8px;
    }
    .vis-legend .vl-item {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: var(--font-m); font-size: 11px;
      color: var(--text-dim); font-weight: 600; letter-spacing: 0.04em;
    }
    .vis-legend .vl-dot {
      width: 10px; height: 10px; border-radius: 50%;
      display: inline-block;
    }
    .vis-legend .vl-dot.green { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .vis-legend .vl-dot.red   { background: var(--red);   box-shadow: 0 0 8px var(--red); }
    .vis-tag {
      display: inline-block;
      padding: 7px 14px;
      border-radius: 999px;
      font-family: var(--font-m); font-size: 11px; font-weight: 800;
      letter-spacing: 0.1em;
      margin: 8px auto;
      align-self: center;
    }
    .vis-tag.good {
      background: rgba(34,197,94,0.16); color: var(--green);
      border: 1px solid rgba(34,197,94,0.4);
      box-shadow: 0 0 16px rgba(34,197,94,0.18);
    }
    .vis-tag.bad {
      background: rgba(239,68,68,0.16); color: var(--red);
      border: 1px solid rgba(239,68,68,0.4);
    }
    .vis-tag.neutral {
      background: rgba(245,158,11,0.16); color: var(--gold);
      border: 1px solid rgba(245,158,11,0.4);
    }
    .patterns-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin-top: 10px;
    }
    .pg-item {
      display: grid; grid-template-columns: 32px 1fr 28px;
      align-items: center; gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 12px;
    }
    .pg-emoji { font-size: 22px; line-height: 1; text-align: center; }
    .pg-name {
      font-family: var(--font-d); font-size: 13px; font-weight: 700;
      color: var(--text);
    }
    .pg-arrow {
      font-size: 18px; font-weight: 800; text-align: center;
    }
    .pg-arrow.up { color: var(--green); }
    .pg-arrow.down { color: var(--red); }
    .pg-arrow.neutral { color: var(--gold); }

    /* Nav buttons */
    .reader-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(0deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0) 100%);
      z-index: 10;
      display: flex; gap: 10px; justify-content: space-between; align-items: center;
    }
    .nav-btn {
      flex: 1; max-width: 140px;
      padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: var(--font-d); font-size: 13px; font-weight: 700;
      border-radius: 12px; cursor: pointer;
      transition: transform 0.12s, background 0.2s;
    }
    .nav-btn:active { transform: scale(0.97); }
    .nav-btn.primary {
      flex: 2;
      background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
      color: #0a0a0c;
      border-color: rgba(167,139,250,0.4);
      box-shadow: 0 8px 20px rgba(167,139,250,0.32);
    }
    .nav-btn:disabled { opacity: 0.4; cursor: default; }

    /* Validation overlay */
    .validate-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.85); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .validate-overlay.show { opacity: 1; pointer-events: auto; }
    .validate-circle {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, var(--purple) 0%, var(--blue) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: 46px; color: #0a0a0c;
      box-shadow: 0 0 40px var(--purple-glow);
      transform: scale(0);
      animation: validate-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes validate-pop { to { transform: scale(1); } }
    .validate-text {
      font-family: var(--font-d); font-size: 18px; font-weight: 800;
      color: var(--text); letter-spacing: -0.01em;
    }

    /* Quiz */
    .quiz-question {
      font-family: var(--font-d); font-size: 17px; font-weight: 700;
      color: var(--text); line-height: 1.3; margin: 0 0 16px;
    }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; }
    .quiz-opt {
      padding: 13px 14px;
      background: rgba(255,255,255,0.04);
      border: 1.5px solid var(--border);
      color: var(--text);
      font-family: var(--font-d); font-size: 14px; font-weight: 600;
      border-radius: 12px; cursor: pointer;
      text-align: left;
      transition: transform 0.1s, background 0.2s, border-color 0.2s;
    }
    .quiz-opt:active { transform: scale(0.98); }
    .quiz-opt.picked.correct { background: rgba(34,197,94,0.18); border-color: var(--green); color: var(--green); }
    .quiz-opt.picked.wrong { background: rgba(239,68,68,0.18); border-color: var(--red); color: var(--red); }
    .quiz-feedback {
      margin-top: 14px;
      padding: 12px 14px;
      background: rgba(167,139,250,0.10);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 12px;
      font-family: var(--font-d); font-size: 13px;
      color: var(--text-dim); line-height: 1.4;
      display: none;
    }
    .quiz-feedback.show { display: block; }
    .quiz-feedback strong { color: var(--purple); }

    @media (max-width: 360px) {
      .hub-title { font-size: 26px; }
      .h1 { font-size: 24px; }
      .demo-canvas { height: 170px; }
    }
  </style>
</head>
<body>

  <!-- ============ HUB ============ -->
  <div id="hub" class="view active">
    <div class="hub-top">
      <button class="back-btn" onclick="goBack()">← MENU</button>
      <div class="hub-brand">TRADE GENIUS</div>
    </div>

      const p = loadProgress();
      p.completed = p.completed || {};
      p.completed[n] = true;
      saveProgress(p);
      try { localStorage.removeItem(BOOKMARK_KEY); } catch {}

    function saveBookmark(chapter, slide) {
      try { localStorage.setItem(BOOKMARK_KEY, JSON.stringify({ chapter, slide, ts: Date.now() })); } catch {}

    function loadBookmark(chapter) {
      try {
        const b = JSON.parse(localStorage.getItem(BOOKMARK_KEY));
        if (!b || b.chapter !== chapter) return null;
        if (Date.now() - b.ts > BOOKMARK_TTL) return null;
        return b.slide;
      } catch { return null; }

      const p = loadProgress();
      if (p.completed && p.completed[n]) return 'complete';
      if (n === 1) return 'available';
      if (p.completed && p.completed[n - 1]) return 'available';
      return 'locked';

    function buildSlides(chapterN) {
      const slides = SLIDES[chapterN] || [];
      track.innerHTML = slides.map((s, i) => `
        <div class="slide s-${s.type}" data-idx="${i}">
          <div class="content">${s.html}</div>
        </div>
      `).join('');
      progressBars.innerHTML = slides.map(() => `<div class="bar"></div>`).join('');
    }

    function update() {
      const total = chapterSize(currentChapter);
      const slides = track.querySelectorAll('.slide');
      const bars = progressBars.querySelectorAll('.bar');
      slides.forEach((s, i) => s.classList.toggle('active', i === cur));
      bars.forEach((b, i) => {
        b.classList.remove('active', 'done');
        if (i < cur) b.classList.add('done');
        else if (i === cur) b.classList.add('active');
      });
      track.style.transform = `translateX(-${cur * 100}%)`;
      counter.textContent = `${cur + 1}/${total}`;
      chapterLabel.textContent = `MODULE 4 · CH.${currentChapter}`;
      navPrev.disabled = cur === 0;
      navNext.textContent = cur === total - 1 ? '✓ Valider' : 'Suivant →';

      if (currentChapter != null) saveBookmark(currentChapter, cur);

      // Lance les canvas animations spécifiques au slide actuel
      const activeSlide = slides[cur];
      if (activeSlide) {
        const canvases = activeSlide.querySelectorAll('canvas');
        canvases.forEach(c => {
          if (c._drawn) return;
          const fn = CANVAS_DRAWERS[c.id];
          if (fn) { fn(c); c._drawn = true; }
        });
      }
    }

    function next() {
      const total = chapterSize(currentChapter);
      if (cur < total - 1) { cur++; update(); if (navigator.vibrate) navigator.vibrate(6); }

    /* ===== CANVAS DEMOS ===== */
    // Mapping id canvas → fonction de dessin (utilisé par update())
    const CANVAS_DRAWERS = {
      'canvas-anatomy'        : (c) => drawAnatomy(c),
      'canvas-hammer'         : (c) => drawHammer(c),
      'canvas-doji'           : (c) => drawDoji(c),

      'canvas-macd'           : (c) => drawMACDDemo(c),
      'canvas-fib'            : (c) => drawFibDemo(c),
    };

    function setupCanvas(canvas) {
      const DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = canvas.offsetWidth * DPR;
      canvas.height = canvas.offsetHeight * DPR;
      return { ctx: canvas.getContext('2d'), w: canvas.width, h: canvas.height, DPR };
    }

    /* ===== Helpers pattern drawing (v2.02) ===== */
    function drawCandle(ctx, x, y, bodyW, candle, alpha, DPR) {
      const isUp = candle.c >= candle.o;
      const color = isUp ? '#22c55e' : '#ef4444';
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = color;
      ctx.fillStyle = color;
      ctx.lineWidth = 2 * DPR;
      // Wick
      ctx.beginPath();
      ctx.moveTo(x, y(candle.hi));
      ctx.lineTo(x, y(candle.lo));
      ctx.stroke();
      // Body
      const top = y(Math.max(candle.o, candle.c));
      const bot = y(Math.min(candle.o, candle.c));
      const bodyH = Math.max(bot - top, 3 * DPR);
      // Glow
      ctx.shadowColor = color;
      ctx.shadowBlur = 8 * DPR;
      ctx.fillRect(x - bodyW / 2, top, bodyW, bodyH);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    function drawDottedArrow(ctx, fromX, fromY, toX, toY, color, DPR) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 2 * DPR;
      ctx.setLineDash([5 * DPR, 4 * DPR]);
      ctx.beginPath();
      ctx.moveTo(fromX, fromY);
      ctx.lineTo(toX, toY);
      ctx.stroke();
      ctx.setLineDash([]);
      // arrowhead
      const ang = Math.atan2(toY - fromY, toX - fromX);
      const a = 8 * DPR;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(toX, toY);
      ctx.lineTo(toX - a * Math.cos(ang - 0.4), toY - a * Math.sin(ang - 0.4));
      ctx.lineTo(toX - a * Math.cos(ang + 0.4), toY - a * Math.sin(ang + 0.4));
      ctx.closePath();
      ctx.fill();
    }

    /* ===== Slide 1 — Anatomie d'une bougie ===== */
    function drawAnatomy(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const cx = w / 2;
      const bodyW = 60 * DPR;
      const wickTop = 30 * DPR;
      const bodyTop = 70 * DPR;
      const bodyBot = 180 * DPR;
      const wickBot = h - 30 * DPR;

      let progress = 0;
      function frame(t) {
        ctx.clearRect(0, 0, w, h);
        // Bougie verte d'exemple
        ctx.globalAlpha = Math.min(progress, 1);
        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2.5 * DPR;
        ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 10 * DPR;
        // Wick
        ctx.beginPath();
        ctx.moveTo(cx, wickTop); ctx.lineTo(cx, wickBot);
        ctx.stroke();
        // Body
        ctx.fillStyle = '#22c55e';
        ctx.fillRect(cx - bodyW / 2, bodyTop, bodyW, bodyBot - bodyTop);
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Labels avec lignes
        if (progress > 0.5) {
          const a = Math.min((progress - 0.5) * 2, 1);
          ctx.globalAlpha = a;
          ctx.font = `${12 * DPR}px JetBrains Mono`;
          ctx.fillStyle = '#a8a8b3';
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.lineWidth = 1 * DPR;

          // HIGH (top of wick)
          ctx.textAlign = 'left';
          ctx.fillStyle = '#f59e0b';
          ctx.fillText('▲ HIGH', cx + 50 * DPR, wickTop + 4 * DPR);
          ctx.beginPath(); ctx.moveTo(cx + 4 * DPR, wickTop); ctx.lineTo(cx + 48 * DPR, wickTop); ctx.stroke();

          // CLOSE (top of body, since green)
          ctx.fillStyle = '#22c55e';
          ctx.fillText('CLOSE', cx + 50 * DPR, bodyTop + 4 * DPR);
          ctx.beginPath(); ctx.moveTo(cx + bodyW / 2, bodyTop); ctx.lineTo(cx + 48 * DPR, bodyTop); ctx.stroke();

          // OPEN (bottom of body)
          ctx.fillStyle = '#ef4444';
          ctx.fillText('OPEN', cx + 50 * DPR, bodyBot + 4 * DPR);
          ctx.beginPath(); ctx.moveTo(cx + bodyW / 2, bodyBot); ctx.lineTo(cx + 48 * DPR, bodyBot); ctx.stroke();

          // LOW (bottom of wick)
          ctx.fillStyle = '#f59e0b';
          ctx.fillText('▼ LOW', cx + 50 * DPR, wickBot + 4 * DPR);
          ctx.beginPath(); ctx.moveTo(cx + 4 * DPR, wickBot); ctx.lineTo(cx + 48 * DPR, wickBot); ctx.stroke();

          // Annotation "MÈCHE" (left side)
          ctx.textAlign = 'right';
          ctx.fillStyle = 'rgba(190,242,100,0.85)';
          ctx.fillText('mèche', cx - 50 * DPR, wickTop + 22 * DPR);
          ctx.fillText('corps', cx - 50 * DPR, (bodyTop + bodyBot) / 2 + 4 * DPR);
          ctx.fillText('mèche', cx - 50 * DPR, wickBot - 12 * DPR);

          ctx.globalAlpha = 1;
        }

        progress += 0.025;
        if (progress < 1.5) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Slide 2 — Hammer ===== */
    function drawHammer(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padX = 30 * DPR, padY = 30 * DPR;
      const useH = h - padY * 2;
      const cw = 60 * DPR;
      const candles = [
        { o: 110, c: 102, hi: 112, lo: 100 },
        { o: 102, c: 95,  hi: 103, lo: 93 },
        { o: 95,  c: 88,  hi: 96,  lo: 86 },
        { o: 88,  c: 95,  hi: 96,  lo: 72 }, // hammer
      ];
      let mn = Infinity, mx = -Infinity;
      candles.forEach(c => { if (c.lo < mn) mn = c.lo; if (c.hi > mx) mx = c.hi; });
      const range = mx - mn;
      const totalW = candles.length * (cw + 20 * DPR);
      const startX = (w - totalW) / 2 + cw / 2;
      const y = (p) => padY + (1 - (p - mn) / range) * useH;

      let progress = 0;
      function frame() {
        ctx.clearRect(0, 0, w, h);
        const visibleCount = Math.min(candles.length, Math.floor(progress * candles.length));
        const partial = (progress * candles.length) - visibleCount;
        for (let i = 0; i < visibleCount; i++) {
          const x = startX + i * (cw + 20 * DPR);
          drawCandle(ctx, x, y, cw, candles[i], 1, DPR);
        }
        if (visibleCount < candles.length && partial > 0) {
          const x = startX + visibleCount * (cw + 20 * DPR);
          drawCandle(ctx, x, y, cw, candles[visibleCount], partial, DPR);
        }

        // Label HAMMER + flèche rebond après que toutes les bougies soient là
        if (progress > 1.05) {
          const a = Math.min((progress - 1.05) * 2, 1);
          ctx.globalAlpha = a;
          const lastX = startX + 3 * (cw + 20 * DPR);
          ctx.font = `bold ${13 * DPR}px Manrope`;
          ctx.fillStyle = '#bef264';
          ctx.textAlign = 'center';
          ctx.fillText('🔨 HAMMER', lastX, padY - 8 * DPR);
          // flèche rebond depuis le bas de la mèche vers le haut
          drawDottedArrow(ctx, lastX, y(72) - 6 * DPR, lastX, y(98), '#22c55e', DPR);
          ctx.fillStyle = '#22c55e';
          ctx.font = `${11 * DPR}px JetBrains Mono`;
          ctx.fillText('REBOND', lastX, h - 8 * DPR);
          ctx.globalAlpha = 1;
        }

        progress += 0.025;
        if (progress < 1.7) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Slide 3 — Doji ===== */
    function drawDoji(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const cx = w / 2;
      const cw = 70 * DPR;
      const padY = 40 * DPR;
      const high = padY;
      const low = h - padY;
      const mid = (high + low) / 2;
      const bodyH = 4 * DPR; // doji = corps ultra-fin

      let progress = 0;
      function frame() {
        ctx.clearRect(0, 0, w, h);

        // wick
        ctx.globalAlpha = Math.min(progress * 2, 1);
        ctx.strokeStyle = '#a78bfa';
        ctx.lineWidth = 3 * DPR;
        ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 12 * DPR;
        ctx.beginPath();
        ctx.moveTo(cx, high); ctx.lineTo(cx, low);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Tiny body
        if (progress > 0.5) {
          ctx.fillStyle = '#f59e0b';
          ctx.fillRect(cx - cw / 2, mid - bodyH / 2, cw, bodyH);
        }

        // Labels et flèches
        if (progress > 0.9) {
          const a = Math.min((progress - 0.9) * 2, 1);
          ctx.globalAlpha = a;
          ctx.font = `bold ${13 * DPR}px Manrope`;
          ctx.fillStyle = '#a78bfa';
          ctx.textAlign = 'center';
          ctx.fillText('⚖️ DOJI', cx, padY - 14 * DPR);

          // Acheteurs ↑ vs Vendeurs ↓ — labels en haut/bas
          ctx.font = `${11 * DPR}px JetBrains Mono`;
          ctx.fillStyle = '#22c55e';
          ctx.fillText('↑ Acheteurs', cx - 100 * DPR, mid - 18 * DPR);
          ctx.fillStyle = '#ef4444';
          ctx.fillText('↓ Vendeurs', cx + 100 * DPR, mid + 22 * DPR);

          // Trait OPEN = CLOSE
          ctx.strokeStyle = 'rgba(245,158,11,0.6)';
          ctx.setLineDash([4 * DPR, 4 * DPR]);
          ctx.lineWidth = 1.5 * DPR;
          ctx.beginPath();
          ctx.moveTo(20 * DPR, mid); ctx.lineTo(w - 20 * DPR, mid);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.fillStyle = '#f59e0b';
          ctx.textAlign = 'right';
          ctx.fillText('OPEN = CLOSE', w - 18 * DPR, mid - 8 * DPR);
          ctx.globalAlpha = 1;
        }

        progress += 0.025;
        if (progress < 1.4) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Slide 4 — Engulfing haussier ===== */
    function drawEngulfing(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const cx = w / 2;
      const padY = 40 * DPR;
      const useH = h - padY * 2;
      const cw = 80 * DPR;
      const gap = 30 * DPR;

      // Bougie 1 (rouge, petite)
      const c1 = { o: 100, c: 92, hi: 102, lo: 90 };
      // Bougie 2 (verte, qui engloutit) — open < c1.close, close > c1.open
      const c2 = { o: 90, c: 108, hi: 110, lo: 88 };

      const mn = 86, mx = 112;
      const range = mx - mn;
      const y = (p) => padY + (1 - (p - mn) / range) * useH;

      const x1 = cx - cw / 2 - gap / 2;
      const x2 = cx + cw / 2 + gap / 2;

      let progress = 0;
      function frame() {
        ctx.clearRect(0, 0, w, h);
        // Étape 1 : draw c1 (jusqu'à progress 0.5)
        const a1 = Math.min(progress * 2, 1);
        drawCandle(ctx, x1, y, cw, c1, a1, DPR);

        // Étape 2 : draw c2 (de progress 0.5 à 1.0)
        if (progress > 0.5) {
          const a2 = Math.min((progress - 0.5) * 2, 1);
          drawCandle(ctx, x2, y, cw, c2, a2, DPR);
        }

        // Labels
        if (progress > 1.0) {
          const a = Math.min((progress - 1.0) * 2, 1);
          ctx.globalAlpha = a;
          ctx.font = `bold ${12 * DPR}px Manrope`;
          ctx.textAlign = 'center';
          ctx.fillStyle = '#ef4444';
          ctx.fillText('1️⃣ Rouge', x1, h - 12 * DPR);
          ctx.fillStyle = '#22c55e';
          ctx.fillText('2️⃣ Verte avale tout', x2, h - 12 * DPR);

          // Highlight rectangle qui englobe c1
          ctx.strokeStyle = '#bef264';
          ctx.setLineDash([6 * DPR, 4 * DPR]);
          ctx.lineWidth = 2 * DPR;
          ctx.strokeRect(x1 - cw / 2 - 6 * DPR, y(c2.hi) - 4 * DPR, cw + 12 * DPR, y(c2.lo) - y(c2.hi) + 8 * DPR);
          ctx.setLineDash([]);
          ctx.globalAlpha = 1;
        }

        progress += 0.025;
        if (progress < 1.5) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Slide 5 — Morning Star (3 bougies) ===== */
    function drawMorningStar(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padY = 40 * DPR;
      const useH = h - padY * 2;
      const cw = 60 * DPR;
      const gap = 24 * DPR;
      const totalW = 3 * cw + 2 * gap;
      const startX = (w - totalW) / 2 + cw / 2;

      const candles = [
        { o: 110, c: 92, hi: 112, lo: 90 },  // 1: grosse rouge
        { o: 90,  c: 88, hi: 93,  lo: 86 },  // 2: petite indécise (proche doji)
        { o: 90,  c: 108, hi: 110, lo: 88 }, // 3: grosse verte
      ];
      let mn = Infinity, mx = -Infinity;
      candles.forEach(c => { if (c.lo < mn) mn = c.lo; if (c.hi > mx) mx = c.hi; });
      const range = mx - mn;
      const y = (p) => padY + (1 - (p - mn) / range) * useH;

      let progress = 0;
      function frame() {
        ctx.clearRect(0, 0, w, h);
        const visibleCount = Math.min(candles.length, Math.floor(progress * candles.length));
        const partial = (progress * candles.length) - visibleCount;
        for (let i = 0; i < visibleCount; i++) {
          drawCandle(ctx, startX + i * (cw + gap), y, cw, candles[i], 1, DPR);
        }
        if (visibleCount < candles.length && partial > 0) {
          drawCandle(ctx, startX + visibleCount * (cw + gap), y, cw, candles[visibleCount], partial, DPR);
        }

        // Labels en bas
        if (progress > 0.4) {
          ctx.globalAlpha = Math.min((progress - 0.4) * 2, 1);
          ctx.font = `${11 * DPR}px JetBrains Mono`;
          ctx.textAlign = 'center';
          ctx.fillStyle = '#ef4444';
          if (progress >= 0.4) ctx.fillText('1', startX, h - 12 * DPR);
          if (progress >= 0.7) { ctx.fillStyle = '#f59e0b'; ctx.fillText('2', startX + cw + gap, h - 12 * DPR); }
          if (progress >= 1.0) { ctx.fillStyle = '#22c55e'; ctx.fillText('3', startX + 2 * (cw + gap), h - 12 * DPR); }
          ctx.globalAlpha = 1;
        }

        // Flèche retournement
        if (progress > 1.1) {
          const a = Math.min((progress - 1.1) * 2, 1);
          ctx.globalAlpha = a;
          drawDottedArrow(
            ctx,
            startX + cw + gap, h - 30 * DPR,
            startX + 2 * (cw + gap), padY + 12 * DPR,
            '#bef264', DPR
          );
          ctx.font = `bold ${12 * DPR}px Manrope`;
          ctx.fillStyle = '#bef264';
          ctx.textAlign = 'center';
          ctx.fillText('⭐ RETOURNEMENT', w / 2, padY - 12 * DPR);
          ctx.globalAlpha = 1;
        }

        progress += 0.022;
        if (progress < 1.6) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Slide 6 — Récap : 4 patterns côte à côte ===== */
    function drawRecapPatterns(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padY = 30 * DPR;
      const useH = h - padY * 2;
      const slots = 4;
      const slotW = w / slots;
      const cw = 22 * DPR;

      const datasets = [
        // Hammer (1 bougie)
        { candles: [{ o: 95, c: 100, hi: 102, lo: 80 }], label: '🔨' },
        // Doji (1 bougie)
        { candles: [{ o: 96, c: 96, hi: 105, lo: 87 }], label: '⚖️' },
        // Engulfing (2 bougies)
        { candles: [{ o: 100, c: 92, hi: 102, lo: 90 }, { o: 90, c: 108, hi: 110, lo: 88 }], label: '🟢' },
        // Morning Star (3 bougies)
        { candles: [{ o: 110, c: 92, hi: 112, lo: 90 }, { o: 90, c: 88, hi: 93, lo: 86 }, { o: 90, c: 108, hi: 110, lo: 88 }], label: '⭐' },
      ];
      const mn = 78, mx = 114;
      const range = mx - mn;
      const y = (p) => padY + (1 - (p - mn) / range) * useH;

      let progress = 0;
      function frame() {
        ctx.clearRect(0, 0, w, h);
        for (let s = 0; s < slots; s++) {
          const slotProg = Math.max(0, Math.min(1, (progress - s * 0.2) * 1.5));
          if (slotProg <= 0) continue;
          const slotCx = slotW * s + slotW / 2;
          const ds = datasets[s];
          const n = ds.candles.length;
          const totalCW = n * cw + (n - 1) * 8 * DPR;
          const sx = slotCx - totalCW / 2 + cw / 2;
          for (let i = 0; i < n; i++) {
            drawCandle(ctx, sx + i * (cw + 8 * DPR), y, cw, ds.candles[i], slotProg, DPR);
          }
          // separator
          if (s < slots - 1) {
            ctx.globalAlpha = 0.15;
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1 * DPR;
            ctx.beginPath();
            ctx.moveTo(slotW * (s + 1), padY); ctx.lineTo(slotW * (s + 1), h - padY);
            ctx.stroke();
            ctx.globalAlpha = 1;
          }
          // Label emoji
          ctx.globalAlpha = slotProg;
          ctx.font = `${22 * DPR}px Manrope`;
          ctx.textAlign = 'center';
          ctx.fillText(ds.label, slotCx, h - 10 * DPR);
          ctx.globalAlpha = 1;
        }
        progress += 0.025;
        if (progress < 1.5) requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
    }

    /* ===== Legacy : drawCandlePatterns (gardé pour compat, redirigé vers anatomie) ===== */
    function drawCandlePatterns(canvas) { drawAnatomy(canvas); }

    function drawRSIDemo(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padX = 24 * DPR, padY = 20 * DPR;
      const useH = h - padY * 2;
      const useW = w - padX * 2;

      // 70/30 zones
      const y70 = padY + useH * 0.3;
      const y30 = padY + useH * 0.7;

      function frame(t) {
        ctx.clearRect(0, 0, w, h);

        // zones overbought/oversold
        ctx.fillStyle = 'rgba(239,68,68,0.08)';
        ctx.fillRect(padX, padY, useW, y70 - padY);
        ctx.fillStyle = 'rgba(34,197,94,0.08)';
        ctx.fillRect(padX, y30, useW, padY + useH - y30);

        // grille
        ctx.strokeStyle = 'rgba(255,255,255,0.05)';
        ctx.lineWidth = 1 * DPR;
        [padY, y70, padY + useH/2, y30, padY + useH].forEach(yv => {
          ctx.beginPath(); ctx.moveTo(padX, yv); ctx.lineTo(padX + useW, yv); ctx.stroke();
        });

        // RSI curve (sine + noise)
        const points = 60;
        const progress = Math.min(t / 1200, 1);
        const visible = Math.floor(progress * points);
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2 * DPR;
        ctx.shadowColor = '#60a5fa';
        ctx.shadowBlur = 6 * DPR;
        ctx.beginPath();
        for (let i = 0; i < visible; i++) {
          const px = padX + (i / (points - 1)) * useW;
          const rsi = 50 + 28 * Math.sin(i / 7) + 6 * Math.sin(i / 2.3);
          const py = padY + (1 - rsi / 100) * useH;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // labels
        ctx.fillStyle = '#ef4444';
        ctx.font = `${9 * DPR}px JetBrains Mono`;
        ctx.textAlign = 'right';
        ctx.fillText('70 surachat', padX + useW - 4 * DPR, y70 - 4 * DPR);
        ctx.fillStyle = '#22c55e';
        ctx.fillText('30 survente', padX + useW - 4 * DPR, y30 + 12 * DPR);

        if (progress < 1) requestAnimationFrame(frame);
      }
      const start = performance.now();
      requestAnimationFrame((t) => frame(t - start));
    }

    function drawMACDDemo(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padX = 18 * DPR, padY = 20 * DPR;
      const useH = h - padY * 2;
      const useW = w - padX * 2;
      const midY = padY + useH / 2;
      const points = 50;

      // Pré-calcul des courbes
      const macd = [], signal = [];
      for (let i = 0; i < points; i++) {
        macd.push(8 * Math.sin(i / 5) + 3 * Math.sin(i / 1.7));
        signal.push(8 * Math.sin((i - 4) / 5) + 2 * Math.sin((i - 4) / 1.7));
      }

      function frame(t) {
        ctx.clearRect(0, 0, w, h);

        // mid line
        ctx.strokeStyle = 'rgba(255,255,255,0.1)';
        ctx.lineWidth = 1 * DPR;
        ctx.beginPath(); ctx.moveTo(padX, midY); ctx.lineTo(padX + useW, midY); ctx.stroke();

        const progress = Math.min(t / 1400, 1);
        const visible = Math.floor(progress * points);

        // histogramme
        for (let i = 0; i < visible; i++) {
          const px = padX + (i / (points - 1)) * useW;
          const hist = macd[i] - signal[i];
          const hy = midY - hist * 4 * DPR;
          ctx.fillStyle = hist >= 0 ? 'rgba(190,242,100,0.45)' : 'rgba(239,68,68,0.45)';
          ctx.fillRect(px - 2 * DPR, Math.min(midY, hy), 4 * DPR, Math.abs(hy - midY));
        }

        // MACD line
        ctx.strokeStyle = '#60a5fa';
        ctx.lineWidth = 2 * DPR;
        ctx.shadowColor = '#60a5fa'; ctx.shadowBlur = 4 * DPR;
        ctx.beginPath();
        for (let i = 0; i < visible; i++) {
          const px = padX + (i / (points - 1)) * useW;
          const py = midY - macd[i] * 4 * DPR;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();

        // Signal line
        ctx.strokeStyle = '#f59e0b';
        ctx.lineWidth = 1.6 * DPR;
        ctx.shadowColor = '#f59e0b';
        ctx.beginPath();
        for (let i = 0; i < visible; i++) {
          const px = padX + (i / (points - 1)) * useW;
          const py = midY - signal[i] * 4 * DPR;
          if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // legend
        ctx.font = `${9 * DPR}px JetBrains Mono`;
        ctx.textAlign = 'left';
        ctx.fillStyle = '#60a5fa';
        ctx.fillText('MACD', padX + 4 * DPR, padY + 10 * DPR);
        ctx.fillStyle = '#f59e0b';
        ctx.fillText('SIGNAL', padX + 50 * DPR, padY + 10 * DPR);

        if (progress < 1) requestAnimationFrame(frame);
      }
      const start = performance.now();
      requestAnimationFrame((t) => frame(t - start));
    }

    function drawFibDemo(canvas) {
      const { ctx, w, h, DPR } = setupCanvas(canvas);
      const padX = 24 * DPR, padY = 18 * DPR;
      const useH = h - padY * 2;
      const useW = w - padX * 2;

      // Faux mouvement haussier
      const start = { x: padX + 20 * DPR, y: padY + useH - 10 * DPR };
      const peak  = { x: padX + useW - 30 * DPR, y: padY + 14 * DPR };

      const levels = [
        { pct: 0,     label: '0%',    color: '#22c55e' },
        { pct: 0.236, label: '23.6%', color: 'rgba(255,255,255,0.4)' },
        { pct: 0.382, label: '38.2%', color: '#a78bfa' },
        { pct: 0.5,   label: '50%',   color: '#60a5fa' },
        { pct: 0.618, label: '61.8%', color: '#f59e0b' },
        { pct: 0.786, label: '78.6%', color: 'rgba(255,255,255,0.4)' },
        { pct: 1,     label: '100%',  color: '#ef4444' },
      ];

      function frame(t) {
        ctx.clearRect(0, 0, w, h);
        const progress = Math.min(t / 1400, 1);

        // mouvement haussier
        const swingProg = Math.min(progress * 1.5, 1);
        const endX = start.x + (peak.x - start.x) * swingProg;
        const endY = start.y + (peak.y - start.y) * swingProg;

        ctx.strokeStyle = '#22c55e';
        ctx.lineWidth = 2.5 * DPR;
        ctx.shadowColor = '#22c55e'; ctx.shadowBlur = 6 * DPR;
        ctx.beginPath();
        ctx.moveTo(start.x, start.y);
        ctx.lineTo(endX, endY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Niveaux Fibo (apparaissent après le mouvement)
        if (progress > 0.4) {
          const fibProg = Math.min((progress - 0.4) / 0.6, 1);
          ctx.font = `${9 * DPR}px JetBrains Mono`;
          ctx.textAlign = 'right';
          ctx.lineWidth = 1 * DPR;
          levels.forEach((lvl, i) => {
            const stagger = i / levels.length;
            if (fibProg < stagger) return;
            const yv = peak.y + (start.y - peak.y) * lvl.pct;
            ctx.strokeStyle = lvl.color;
            ctx.globalAlpha = 0.7;
            ctx.setLineDash([4 * DPR, 4 * DPR]);
            ctx.beginPath();
            ctx.moveTo(padX, yv); ctx.lineTo(padX + useW, yv);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.globalAlpha = 1;
            ctx.fillStyle = lvl.color;
            ctx.fillText(lvl.label, padX + useW - 2 * DPR, yv - 3 * DPR);
          });
        }

        if (progress < 1) requestAnimationFrame(frame);
      }
      const ts = performance.now();
      requestAnimationFrame((t) => frame(t - ts));
    }

    /* ===== INIT ===== */
    window.addEventListener('load', renderHub);

    // Touch swipe nav
    let touchStartX = 0;
    document.getElementById('reader').addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    }, { passive: true });
    document.getElementById('reader').addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) {
        if (dx < 0) next(); else prev();
      }
    }, { passive: true });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('reader').classList.contains('active')) {
        if (e.key === 'ArrowRight') next();
        else if (e.key === 'ArrowLeft') prev();
        else if (e.key === 'Escape') closeReader();
      }
    });
  </script>
