  function setupCanvas(canvas) {
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = canvas.offsetWidth * DPR;
    canvas.height = canvas.offsetHeight * DPR;
    return { ctx: canvas.getContext('2d'), w: canvas.width, h: canvas.height, DPR };
  }

  function drawKrach(canvas, points, labels) {
    const { ctx, w, h, DPR } = setupCanvas(canvas);
    const padX = 24 * DPR, padY = 28 * DPR;
    const useW = w - padX * 2, useH = h - padY * 2;
    let mn = Infinity, mx = -Infinity;
    points.forEach(p => { if (p < mn) mn = p; if (p > mx) mx = p; });
    const range = mx - mn || 1;
    const stepX = useW / (points.length - 1);
    const y = (v) => padY + (1 - (v - mn) / range) * useH;

    let progress = 0;
    function frame() {
      ctx.clearRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1 * DPR;
      for (let g = 1; g < 4; g++) {
        const gy = padY + (useH / 4) * g;
        ctx.beginPath();
        ctx.moveTo(padX, gy); ctx.lineTo(padX + useW, gy);
        ctx.stroke();
      }

      const lastIdx = Math.min(points.length - 1, Math.floor(progress * (points.length - 1)));
      const local = (progress * (points.length - 1)) - lastIdx;

      const grad = ctx.createLinearGradient(0, padY, 0, padY + useH);
      grad.addColorStop(0, 'rgba(239,68,68,0.04)');
      grad.addColorStop(1, 'rgba(239,68,68,0.32)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(padX, padY + useH);
      for (let i = 0; i <= lastIdx; i++) ctx.lineTo(padX + i * stepX, y(points[i]));
      if (lastIdx < points.length - 1 && local > 0) {
        const ix = padX + lastIdx * stepX;
        const nx = padX + (lastIdx + 1) * stepX;
        const iy = y(points[lastIdx]);
        const ny = y(points[lastIdx + 1]);
        ctx.lineTo(ix + (nx - ix) * local, iy + (ny - iy) * local);
        ctx.lineTo(ix + (nx - ix) * local, padY + useH);
      } else {
        ctx.lineTo(padX + lastIdx * stepX, padY + useH);
      }
      ctx.closePath();
      ctx.fill();

      ctx.strokeStyle = '#ef4444';
      ctx.lineWidth = 2 * DPR;
      ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 8 * DPR;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i <= lastIdx; i++) {
        const px = padX + i * stepX;
        const py = y(points[i]);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      if (lastIdx < points.length - 1 && local > 0) {
        const ix = padX + lastIdx * stepX;
        const nx = padX + (lastIdx + 1) * stepX;
        const iy = y(points[lastIdx]);
        const ny = y(points[lastIdx + 1]);
        ctx.lineTo(ix + (nx - ix) * local, iy + (ny - iy) * local);
      }
      ctx.stroke();
      ctx.shadowBlur = 0;

      if (progress >= 1) {
        ctx.font = `bold ${10 * DPR}px JetBrains Mono`;
        labels.forEach(lbl => {
          const px = padX + lbl.i * stepX;
          const py = y(points[lbl.i]);
          ctx.fillStyle = lbl.color || '#f59e0b';
          ctx.beginPath();
          ctx.arc(px, py, 4 * DPR, 0, Math.PI * 2);
          ctx.fill();
          ctx.textAlign = lbl.align || 'center';
          ctx.fillText(lbl.text, px + (lbl.dx || 0) * DPR, py + (lbl.dy || -10) * DPR);
        });
      }

      if (progress < 1) {
        progress = Math.min(progress + 0.018, 1);
        requestAnimationFrame(frame);
      }
    }
    frame();
  }

  /* === Routing list ↔ detail === */
  let _currentKrach = null;

  function renderList() {
    const grid = document.getElementById('krachs-grid');
    grid.innerHTML = Object.keys(KRACHS).map(key => {
      const k = KRACHS[key];
      return `
        <div class="krach-card" data-key="${key}" onclick="openDetail('${key}')">
          <div class="kc-head"><span class="kc-year">${k.year}</span><span class="kc-loss">${k.loss}</span></div>
          <h2 class="kc-name">${k.name}</h2>
          <p class="kc-tag">${k.tag}</p>
          <canvas class="kc-canvas" data-key="${key}"></canvas>
          <div class="kc-tease">
            <span>Voir l'analyse complète</span>
            <span class="kc-arrow">→</span>
          </div>
        </div>
      `;
    }).join('');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const c = e.target;
          if (c._drawn) return;
          const key = c.dataset.key;
          const k = KRACHS[key];
          if (k) { drawKrach(c, k.points, k.labels); c._drawn = true; }
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.kc-canvas').forEach(c => observer.observe(c));
  }

  function openDetail(key) {
    if (navigator.vibrate) navigator.vibrate(8);
    _currentKrach = key;
    const k = KRACHS[key];
    if (!k) return;

    const detail = document.getElementById('view-detail');
    detail.innerHTML = `
      <div class="d-hero">
        <div class="d-hero-head"><span class="d-year">${k.year}</span><span class="d-loss">${k.loss}</span></div>
        <h1 class="d-name">${k.name}</h1>
        <p class="d-tag">${k.tag}</p>
        <canvas class="d-canvas" id="d-canvas"></canvas>
      </div>

      <div class="section">
        <div class="section-eyebrow">CONTEXTE</div>
        <h2 class="section-title">Avant la <em>tempête</em></h2>
        <p class="section-text">${k.context}</p>
      </div>

      <div class="section">
        <div class="section-eyebrow">CHRONOLOGIE</div>
        <h2 class="section-title">Comment ça s'est passé</h2>
        <div class="timeline">
          ${k.timeline.map(row => `
            <div class="tl-row">
              <div class="tl-date">${row.d}</div>
              <div class="tl-body">${row.t}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-eyebrow">CAUSES</div>
        <h2 class="section-title">Pourquoi ça a <em>explosé</em></h2>
        <p class="section-text">${k.causes}</p>

        <h2 class="section-title">Ce qu'on aurait dû <em class="gold">voir</em></h2>
        <div class="signs-list">
          ${k.signs.map(s => `
            <div class="sg-row">
              <div class="sg-ico">${s.i}</div>
              <div class="sg-txt">${s.t}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-eyebrow green">SE PRÉMUNIR</div>
        <h2 class="section-title">Comment <em class="green">éviter</em> la prochaine</h2>
        <div class="protect-list">
          ${k.protect.map(p => `
            <div class="pr-row">
              <div class="pr-ico">${p.i}</div>
              <div class="pr-txt">${p.t}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="section">
        <div class="section-eyebrow purple">LEÇONS</div>
        <h2 class="section-title">À <em class="purple">retenir</em></h2>
        <div class="lessons-list">
          ${k.lessons.map(l => `
            <div class="ls-row">
              <div class="ls-ico">${l.i}</div>
              <div class="ls-txt">${l.t}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;

    document.getElementById('view-list').classList.remove('active');
    detail.classList.add('active');
    document.getElementById('back-btn').textContent = '← KRACHS';
    window.scrollTo(0, 0);

    setTimeout(() => {
      const c = document.getElementById('d-canvas');
      if (c) drawKrach(c, k.points, k.labels);
    }, 60);
  }

  function closeDetail() {
    if (navigator.vibrate) navigator.vibrate(6);
    document.getElementById('view-detail').classList.remove('active');
    document.getElementById('view-list').classList.add('active');
    document.getElementById('back-btn').textContent = '← ACCUEIL';
    _currentKrach = null;
    window.scrollTo(0, 0);
  }

  function goBack() {
    if (_currentKrach) closeDetail();
    else window.location.href = 'index.html#feed';
  }

  renderList();
</script>

</body>
</html>
