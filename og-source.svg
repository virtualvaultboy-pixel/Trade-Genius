<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#16161c"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="40%" r="40%">
      <stop offset="0%" stop-color="rgba(190,242,100,0.25)"/>
      <stop offset="100%" stop-color="rgba(190,242,100,0)"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top acid line -->
  <rect x="0" y="0" width="1200" height="6" fill="#bef264"/>

  <!-- Logo T-chandelier (left) -->
  <g transform="translate(140, 200) scale(2.6)">
    <rect x="14" y="20" width="72" height="10" rx="2" fill="#bef264"/>
    <rect x="48.5" y="30" width="3" height="9" opacity="0.85" fill="#bef264"/>
    <rect x="40" y="39" width="20" height="40" rx="2" fill="#bef264"/>
    <rect x="48.5" y="79" width="3" height="6" opacity="0.85" fill="#bef264"/>
  </g>

  <!-- Brand name + title (right) -->
  <text x="460" y="240" font-family="Bricolage Grotesque, Georgia, serif" font-size="76" font-weight="800" fill="#f5f3ef" letter-spacing="-2">TRADE GENIUS</text>
  <text x="460" y="310" font-family="Bricolage Grotesque, Georgia, serif" font-size="44" font-weight="700" fill="#bef264" letter-spacing="-1" font-style="italic">Apprends la bourse</text>
  <text x="460" y="358" font-family="Bricolage Grotesque, Georgia, serif" font-size="44" font-weight="700" fill="#bef264" letter-spacing="-1" font-style="italic">de zéro.</text>

  <!-- Features pills -->
  <g transform="translate(460, 410)">
    <rect x="0" y="0" width="240" height="42" rx="21" fill="rgba(190,242,100,0.12)" stroke="rgba(190,242,100,0.4)" stroke-width="1.5"/>
    <text x="120" y="28" text-anchor="middle" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#bef264">📚 4 modules pédago</text>

    <rect x="260" y="0" width="280" height="42" rx="21" fill="rgba(190,242,100,0.12)" stroke="rgba(190,242,100,0.4)" stroke-width="1.5"/>
    <text x="400" y="28" text-anchor="middle" font-family="Manrope, sans-serif" font-size="18" font-weight="700" fill="#bef264">🎮 Simulateur réaliste</text>
  </g>

  <!-- Footer -->
  <text x="460" y="540" font-family="JetBrains Mono, monospace" font-size="18" font-weight="600" fill="rgba(245,243,239,0.5)" letter-spacing="3">PAS DE PUB · PAS DE GOUROUS · JUSTE DE LA PÉDAGOGIE</text>
  <text x="1080" y="595" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="14" font-weight="600" fill="rgba(245,243,239,0.35)" letter-spacing="2">✦ DEPONCHY STUDIO · 2026</text>
</svg>
