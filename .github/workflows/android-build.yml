name: Android APK build
on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'mobile/**'
      - 'tg-*.js'
      - 'index.html'
      - 'scene-*.html'
      - 'glossary.html'
      - 'capacitor.config.json'
      - 'package.json'
      - '.github/workflows/android-build.yml'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm deps
        run: npm ci

      - name: Sync web assets
        run: npm run prepare-web

      - name: Capacitor sync
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Read version
        id: version
        run: |
          VER=$(grep -oE "TG_VERSION = 'v[0-9.]+'" tg-common.js | grep -oE "[0-9.]+")
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Detected version: $VER"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: trade-genius-debug-${{ steps.version.outputs.version }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create / update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-android
          name: Trade Genius Android v${{ steps.version.outputs.version }}
          body: |
            APK Android Trade Genius — build automatique depuis `main`.

            **Installation :**
            1. Télécharge `app-debug.apk` ci-dessous
            2. Sur ton Samsung : Paramètres → Apps → Autoriser sources inconnues
            3. Ouvre l'APK pour installer

            **Activer la bulle 🤖 :** ouvre l'app puis suis l'onboarding (3 permissions en 1 minute).
          files: android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          token: ${{ secrets.GITHUB_TOKEN }}
