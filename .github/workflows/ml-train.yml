name: ML Pipeline (v4.0)
# Entraîne 3 modèles XGBoost (DAY, WEEK, MONTH) sur features techniques
# extraites de 50 actifs × 20 ans. Tourne à la demande (workflow_dispatch).
# Output : data/ml/rules.json consommé par build-ai-study.mjs.
on:
  workflow_dispatch:
    inputs:
      history_range:
        description: "Range Yahoo (10y, 15y, 20y, max)"
        required: false
        default: "20y"

permissions:
  contents: write

jobs:
  ml-train:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/ml/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/ml/requirements.txt

      - name: Build dataset (Node)
        env:
          TG_ML_RANGE: ${{ github.event.inputs.history_range }}
        run: node --max-old-space-size=4096 scripts/ml/build-dataset.mjs

      - name: Train XGBoost models (Python)
        run: python scripts/ml/train.py

      - name: Export rules.json
        run: python scripts/ml/export-thresholds.py

      - name: Commit ML artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ml/rules.json data/ml/metrics.json
          # On NE COMMIT PAS le dataset (trop lourd) ni les .json modèles XGBoost
          if [ -n "$(git status --porcelain data/ml/)" ]; then
            git commit -m "chore: ML v4.0 train (${{ github.event.inputs.history_range }}) [skip ci]"
            for i in 1 2 3; do
              if git push; then break; fi
              git pull --rebase origin main
            done
          else
            echo "no change"
          fi
