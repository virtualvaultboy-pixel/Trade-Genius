<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" aria-label="Trade Genius">
  <rect width="512" height="512" rx="96" fill="#0a0a0c"/>
  <g fill="#bef264">
    <!-- Toit du T -->
    <rect x="80" y="120" width="352" height="48" rx="10"/>
    <!-- Mèche supérieure de la bougie -->
    <rect x="246" y="168" width="20" height="44" rx="4" opacity="0.85"/>
    <!-- Corps de la bougie haussière (tige du T) -->
