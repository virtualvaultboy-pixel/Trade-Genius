  <style>
    :root {

<script>
  /* ===================================================
     PATTERNS LAB v2.09 — list + detail détaillé par pattern
     =================================================== */
  function setupCanvas(canvas) {
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = canvas.offsetWidth * DPR;
    canvas.height = canvas.offsetHeight * DPR;
    return { ctx: canvas.getContext('2d'), w: canvas.width, h: canvas.height, DPR };
  }
  function drawCurve(ctx, points, color, lineW, DPR, progress = 1) {
    ctx.strokeStyle = color;
    ctx.lineWidth = lineW * DPR;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowColor = color; ctx.shadowBlur = 6 * DPR;
    const lastIdx = Math.floor(progress * (points.length - 1));
    ctx.beginPath();
    for (let i = 0; i <= lastIdx; i++) {
      const [x, y] = points[i];
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    if (lastIdx < points.length - 1) {
      const local = (progress * (points.length - 1)) - lastIdx;
      const [x0, y0] = points[lastIdx];
      const [x1, y1] = points[lastIdx + 1];
      ctx.lineTo(x0 + (x1 - x0) * local, y0 + (y1 - y0) * local);
    }
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  function dashLine(ctx, x1, y1, x2, y2, color, DPR) {
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5 * DPR;
    ctx.setLineDash([5 * DPR, 4 * DPR]);
    ctx.beginPath();
    ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  function label(ctx, text, x, y, color, DPR, align = 'center', size = 10) {
    ctx.font = `bold ${size * DPR}px JetBrains Mono`;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.fillText(text, x, y);
  }

  /* === Drawers (réutilisés en grand sur la vue detail) === */
  function drawHSTop(canvas) {
    const { ctx, w, h, DPR } = setupCanvas(canvas);
    const padX = 20 * DPR, padY = 30 * DPR;
    const useW = w - padX * 2, useH = h - padY * 2;
    const pts = [
      [0.00, 0.85], [0.07, 0.7], [0.13, 0.55],
      [0.18, 0.4], [0.22, 0.45],
      [0.30, 0.6], [0.35, 0.55],
      [0.43, 0.3], [0.48, 0.15], [0.53, 0.2],
      [0.60, 0.45], [0.65, 0.5],
      [0.72, 0.35], [0.78, 0.40],
      [0.85, 0.65], [0.92, 0.85], [1.00, 0.95]
    ].map(([px, py]) => [padX + px * useW, padY + py * useH]);
    let progress = 0;
    function frame() {
      ctx.clearRect(0, 0, w, h);
      drawCurve(ctx, pts, '#ef4444', 2, DPR, progress);
      if (progress >= 1) {
        const neckY = padY + 0.6 * useH;
        dashLine(ctx, padX, neckY, padX + useW, neckY, '#f59e0b', DPR);
        label(ctx, 'NECKLINE', padX + useW - 8 * DPR, neckY - 4 * DPR, '#f59e0b', DPR, 'right', 9);
        label(ctx, 'É.G', pts[3][0], pts[3][1] - 8 * DPR, '#a8a8b3', DPR);
        label(ctx, 'TÊTE', pts[8][0], pts[8][1] - 8 * DPR, '#ef4444', DPR, 'center', 11);
        label(ctx, 'É.D', pts[13][0], pts[13][1] - 8 * DPR, '#a8a8b3', DPR);
      }
      if (progress < 1) { progress = Math.min(progress + 0.02, 1); requestAnimationFrame(frame); }
    }
    frame();
  }
  function drawHSBottom(canvas) {
    const { ctx, w, h, DPR } = setupCanvas(canvas);
    const padX = 20 * DPR, padY = 30 * DPR;
    const useW = w - padX * 2, useH = h - padY * 2;
    const pts = [
      [0.00, 0.15], [0.07, 0.3], [0.13, 0.45],
      [0.18, 0.60], [0.22, 0.55],
      [0.30, 0.40], [0.35, 0.45],
      [0.43, 0.70], [0.48, 0.85], [0.53, 0.80],
      [0.60, 0.55], [0.65, 0.50],
      [0.72, 0.65], [0.78, 0.60],
      [0.85, 0.35], [0.92, 0.15], [1.00, 0.05]
    ].map(([px, py]) => [padX + px * useW, padY + py * useH]);
    let progress = 0;
    function frame() {
      ctx.clearRect(0, 0, w, h);
      drawCurve(ctx, pts, '#22c55e', 2, DPR, progress);
      if (progress >= 1) {
        const neckY = padY + 0.4 * useH;
        dashLine(ctx, padX, neckY, padX + useW, neckY, '#f59e0b', DPR);
        label(ctx, 'NECKLINE', padX + useW - 8 * DPR, neckY - 4 * DPR, '#f59e0b', DPR, 'right', 9);
        label(ctx, 'É.G', pts[3][0], pts[3][1] + 14 * DPR, '#a8a8b3', DPR);
        label(ctx, 'TÊTE', pts[8][0], pts[8][1] + 14 * DPR, '#22c55e', DPR, 'center', 11);
        label(ctx, 'É.D', pts[13][0], pts[13][1] + 14 * DPR, '#a8a8b3', DPR);
      }
      if (progress < 1) { progress = Math.min(progress + 0.02, 1); requestAnimationFrame(frame); }
    }
    frame();
  }
  function drawDoubleTop(canvas) {
    const { ctx, w, h, DPR } = setupCanvas(canvas);
    const padX = 20 * DPR, padY = 30 * DPR;
    const useW = w - padX * 2, useH = h - padY * 2;
    const pts = [
      [0.00, 0.85], [0.10, 0.65], [0.18, 0.45], [0.25, 0.25], [0.30, 0.20],
      [0.40, 0.45], [0.45, 0.55], [0.50, 0.50],
      [0.58, 0.30], [0.65, 0.22], [0.70, 0.20],
      [0.80, 0.50], [0.88, 0.75], [1.00, 0.95]
    ].map(([px, py]) => [padX + px * useW, padY + py * useH]);
    let progress = 0;
    function frame() {
      ctx.clearRect(0, 0, w, h);
      drawCurve(ctx, pts, '#ef4444', 2, DPR, progress);
      if (progress >= 1) {
        const topY = padY + 0.2 * useH;
        const suppY = padY + 0.55 * useH;
        dashLine(ctx, padX, topY, padX + useW, topY, 'rgba(239,68,68,0.5)', DPR);
        dashLine(ctx, padX, suppY, padX + useW, suppY, '#f59e0b', DPR);
        label(ctx, 'RÉSIST.', padX + 8 * DPR, topY - 4 * DPR, '#ef4444', DPR, 'left', 9);
        label(ctx, 'SUPPORT', padX + useW - 8 * DPR, suppY - 4 * DPR, '#f59e0b', DPR, 'right', 9);
        label(ctx, 'M', pts[4][0], pts[4][1] - 8 * DPR, '#ef4444', DPR, 'center', 12);
        label(ctx, 'M', pts[10][0], pts[10][1] - 8 * DPR, '#ef4444', DPR, 'center', 12);
      }
      if (progress < 1) { progress = Math.min(progress + 0.02, 1); requestAnimationFrame(frame); }
    }
    frame();
  }
  function drawDoubleBottom(canvas) {
    const { ctx, w, h, DPR } = setupCanvas(canvas);

  /* === Routing list ↔ detail === */
  let _currentPattern = null;

  function renderList() {
    const grid = document.getElementById('patterns-grid');
    grid.innerHTML = Object.keys(PATTERNS).map(key => {
      const p = PATTERNS[key];
      return `
        <div class="pattern-card" data-key="${key}" onclick="openDetail('${key}')">
          <div class="pc-head">
            <span class="pc-name">${p.name}</span>
            <span class="pc-tag ${p.tag}">${p.tagLabel}</span>
          </div>
          <canvas class="pc-canvas" data-key="${key}"></canvas>
          <div class="pc-tease">
            <span>${p.teaser}</span>
            <span class="pc-arrow">→</span>
          </div>
        </div>
      `;
    }).join('');

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const c = e.target;
          if (c._drawn) return;
          const key = c.dataset.key;
          const p = PATTERNS[key];
          if (p && p.drawer) { p.drawer(c); c._drawn = true; }
        }
      });
    }, { threshold: 0.3 });
    document.querySelectorAll('.pc-canvas').forEach(c => observer.observe(c));
  }

            <div class="tc-lbl">Entrée</div>
            <div class="tc-txt">${p.trade.entry}</div>
          </div>
          <div class="trade-cell stop">
            <div class="tc-lbl">Stop</div>
            <div class="tc-txt">${p.trade.stop}</div>
          </div>
          <div class="trade-cell target">
            <div class="tc-lbl">Cible</div>
            <div class="tc-txt">${p.trade.target}</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-eyebrow">PIÈGES</div>
        <h2 class="section-title">Faux signaux à éviter</h2>
        <div class="pitfall">
          <div class="pf-lbl">⚠ Attention</div>
          <p class="pf-txt">${p.pitfall}</p>
        </div>
      </div>

      <div class="section">
        <div class="section-eyebrow">EXEMPLES HISTORIQUES</div>
        <h2 class="section-title">Cas <em>réels</em></h2>
        <div class="historic">
          <div class="h-lbl">📜 Marchés</div>
          <p class="h-txt">${p.historic}</p>
        </div>
      </div>
    `;

    document.getElementById('view-list').classList.remove('active');
    detail.classList.add('active');
    document.getElementById('back-btn').textContent = '← PATTERNS';
    window.scrollTo(0, 0);

    setTimeout(() => {
      const c = document.getElementById('d-canvas');
      if (c && p.drawer) p.drawer(c);
    }, 60);
  }

  function closeDetail() {
    if (navigator.vibrate) navigator.vibrate(6);
    document.getElementById('view-detail').classList.remove('active');
    document.getElementById('view-list').classList.add('active');
    document.getElementById('back-btn').textContent = '← ACCUEIL';
    _currentPattern = null;
    window.scrollTo(0, 0);
  }

  function goBack() {
    if (_currentPattern) closeDetail();
    else window.location.href = 'index.html#accueil';
  }

  renderList();
</script>

</body>
</html>
